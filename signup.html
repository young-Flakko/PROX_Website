<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PROX PULSE — Sign Up</title>
  <script src="js/theme.js"></script>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="page-wrap">

  <nav class="navbar">
    <div class="container">
      <div class="nav-brand">
        <a href="index.html">PROX<span class="dot">.</span>PULSE <span class="brand-tag">v2</span></a>
      </div>
      <div class="nav-links">
        <a href="index.html">Feed</a>
      </div>
      <div class="nav-auth">
        <button class="theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme">☀</button>
        <a href="login.html" class="btn btn-ghost btn-sm">Log in</a>
      </div>
    </div>
  </nav>

  <div class="center-page">
    <div class="auth-card">
      <div class="corner-tl"></div>
      <div class="corner-br"></div>

      <div class="auth-logo">PROX<span style="color:var(--text2)">.</span>PULSE</div>
      <h1>Request Access</h1>
      <p class="subtitle">// CREATE YOUR OPERATOR IDENTITY</p>

      <form id="signup-form">
        <div class="form-group">
          <label for="signup-name">Display name</label>
          <input type="text" id="signup-name" placeholder="YourHandle" required autocomplete="nickname"/>
        </div>
        <div class="form-group">
          <label for="signup-email">Email address</label>
          <input type="email" id="signup-email" placeholder="operator@pulse.net" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" placeholder="Min 6 characters" required autocomplete="new-password"/>
        </div>
        <div id="signup-error" class="form-error"></div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:0.75rem">
          Create Identity
        </button>
      </form>

      <p class="switch-link">
        Already have access? <a href="login.html">Log in →</a>
      </p>

      <p style="font-size:0.72rem;color:var(--text3);text-align:center;margin-top:1rem;font-family:var(--font-mono);letter-spacing:0.05em;line-height:1.5;">
        New accounts start as <span style="color:var(--gold)">user</span> role.<br/>
        Admin access is assigned by PROX.
      </p>
    </div>
  </div>

</div>
<script type="module" src="js/auth.js"></script>
</body>
</html>
